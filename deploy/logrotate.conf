# Logrotate config for the news pipeline.
# Install on droplet:
#   sudo cp deploy/logrotate.conf /etc/logrotate.d/news-pipeline
#
# systemd services log to journald (handled by systemd's own rotation).
# This file rotates any plain-text logs we explicitly write to /var/log/news-pipeline.

/var/log/news-pipeline/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 news news
    sharedscripts
}
